<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>COGS Repository Tree</title>
  <style>
    :root {
      --win-bg: #c0c0c0;
      --win-face: #dfdfdf;
      --win-dark: #404040;
      --win-light: #ffffff;
      --win-accent: #000080;
      --win-accent-fg: #ffffff;
      --win-hover: #0000a0;
      --font: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font);
      font-size: 13px;
      background: var(--win-bg);
      color: #000;
    }
    .titlebar {
      background: linear-gradient(90deg, var(--win-accent), #1084d0);
      color: var(--win-accent-fg);
      padding: 6px 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .titlebar span { opacity: 0.85; font-weight: 400; font-size: 12px; }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 2px solid var(--win-dark);
      background: var(--win-face);
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input[type="search"] {
      flex: 1;
      min-width: 180px;
      padding: 4px 8px;
      border: 2px inset var(--win-bg);
      font: inherit;
    }
    .btn {
      padding: 3px 10px;
      border: 2px outset var(--win-bg);
      background: var(--win-bg);
      cursor: pointer;
      font: inherit;
    }
    .btn:active { border-style: inset; }
    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 34%) 1fr;
      height: calc(100vh - 72px);
    }
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
    }
    .panel {
      border: 2px inset var(--win-bg);
      background: var(--win-light);
      overflow: auto;
    }
    .tree-panel { padding: 6px 0; }
    .detail-panel { padding: 14px 16px; }
    .detail-empty {
      color: #666;
      padding: 40px 20px;
      text-align: center;
    }
    .tree-node { user-select: none; }
    .tree-row {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 2px 6px 2px 0;
      cursor: pointer;
      white-space: nowrap;
    }
    .tree-row:hover { background: var(--win-accent); color: var(--win-accent-fg); }
    .tree-row.selected { background: var(--win-accent); color: var(--win-accent-fg); }
    .tree-row.match { background: #ffffcc; color: #000; }
    .tree-row.hidden { display: none; }
    .chevron {
      width: 16px;
      text-align: center;
      flex-shrink: 0;
      opacity: 0.7;
      font-size: 10px;
    }
    .chevron.empty { visibility: hidden; }
    .icon { width: 18px; text-align: center; flex-shrink: 0; }
    .label { overflow: hidden; text-overflow: ellipsis; }
    .tag {
      margin-left: 6px;
      opacity: 0.65;
      font-size: 11px;
      font-weight: 400;
    }
    .tree-row:hover .tag, .tree-row.selected .tag { opacity: 0.85; }
    .children { display: none; }
    .children.open { display: block; }
    .detail-path {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background: var(--win-face);
      border: 1px inset var(--win-bg);
      padding: 6px 8px;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .detail h2 { margin: 0 0 8px; font-size: 16px; }
    .detail .tagline { color: #444; margin-bottom: 14px; }
    .detail section { margin-bottom: 16px; }
    .detail h3 {
      margin: 0 0 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--win-accent);
    }
    .detail p { margin: 0 0 8px; line-height: 1.45; }
    .detail table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .detail th, .detail td {
      border: 1px solid #999;
      padding: 4px 8px;
      text-align: left;
      vertical-align: top;
    }
    .detail th { background: var(--win-face); }
    .pill {
      display: inline-block;
      background: #ffffcc;
      border: 1px solid #cc9;
      padding: 1px 6px;
      font-size: 11px;
      margin-right: 4px;
    }
    .links { margin-top: 14px; font-size: 12px; }
    .links a { color: var(--win-accent); }
    .statusbar {
      border-top: 2px solid var(--win-light);
      padding: 3px 10px;
      font-size: 11px;
      background: var(--win-bg);
      display: flex;
      gap: 16px;
    }
  </style>
</head>

    function pathFor(id) {
      const n = NODES[id];
      if (!n) return id;
      if (n.parent) return n.parent + n.name;
      if (id === "root") return ".";
      return n.name;
    }

    function renderDetail(id) {
      const el = document.getElementById("detail");
      const n = NODES[id];
      if (!n) return;

      let html = `<div class="detail">`;
      html += `<div class="detail-path">${pathFor(id)}</div>`;
      html += `<h2>${n.name}${n.tag ? ` <span class="pill">${n.tag}</span>` : ""}</h2>`;
      if (n.summary) html += `<p class="tagline">${n.summary}</p>`;

      if (n.note) {
        html += `<section><h3>Quick note</h3><p>${n.note}</p></section>`;
      }
      if (n.couldAdd) {
        html += `<section><h3>Could add</h3><p>${n.couldAdd}</p></section>`;
      }
      if (n.files && n.files.length) {
        html += `<section><h3>Files</h3><table><tr><th>File</th><th>Purpose</th></tr>`;
        for (const [f, p] of n.files) {
          html += `<tr><td><code>${f}</code></td><td>${p}</td></tr>`;
        }
        html += `</table></section>`;
      }
      if (n.links) {
        html += `<div class="links">`;
        for (const l of n.links) html += `<a href="${l.href}">${l.label}</a> · `;
        html += `</div>`;
      }
      if (id === "root") {
        html += `<section><h3>App map</h3><pre style="font-size:11px;line-height:1.4;background:#f4f4f4;padding:8px;border:1px inset #c0c0c0">app/page.tsx
├── Header: Review | Tracking | Inbox | Bulk Add | Quick Add
└── Tabs
    ├── Home ── Habits | Plan | To Do | Goals | Tracking
    ├── Lists ── Win98 file manager
    ├── Scheduler ── Always → Year → Month → Week → Day
    ├── Modules ── composable widgets
    └── Analytics ── charts</pre></section>`;
        html += `<section><h3>Highest-impact gaps</h3><table><tr><th>Area</th><th>Status</th><th>Next step</th></tr>`;
        for (const [a, s, nxt] of GAPS) html += `<tr><td>${a}</td><td>${s}</td><td>${nxt}</td></tr>`;
        html += `</table></section>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    function renderTreeNode(id, depth = 0) {
      const n = NODES[id];
      if (!n) return "";
      const hasChildren = n.children && n.children.length;
      const isOpen = openSet.has(id);
      const isSelected = selectedId === id;
      const pad = depth * 14;

      let row = `<div class="tree-node" data-id="${id}">`;
      row += `<div class="tree-row${isSelected ? " selected" : ""}" style="padding-left:${pad}px" data-id="${id}">`;
      row += `<span class="chevron${hasChildren ? "" : " empty"}">${hasChildren ? (isOpen ? "▼" : "▶") : ""}</span>`;
      row += `<span class="icon">${hasChildren ? "📁" : "📄"}</span>`;
      row += `<span class="label">${n.name}${n.tag ? `<span class="tag">${n.tag}</span>` : ""}</span>`;
      row += `</div>`;

      if (hasChildren) {
        row += `<div class="children${isOpen ? " open" : ""}">`;
        for (const cid of n.children) row += renderTreeNode(cid, depth + 1);
        row += `</div>`;
      }
      row += `</div>`;
      return row;
    }

    function renderTree() {
      document.getElementById("tree").innerHTML = renderTreeNode("root");
      document.getElementById("nodeCount").textContent = Object.keys(NODES).length + " documented nodes";
      bindTreeEvents();
    }

    function bindTreeEvents() {
      document.querySelectorAll(".tree-row").forEach(row => {
        row.onclick = (e) => {
          e.stopPropagation();
          const id = row.dataset.id;
          const n = NODES[id];
          selectedId = id;
          if (n.children?.length) {
            if (openSet.has(id)) openSet.delete(id);
            else openSet.add(id);
          }
          renderTree();
          renderDetail(id);
        };
      });
    }

    function expandAll() {
      for (const id of Object.keys(NODES)) {
        if (NODES[id].children) openSet.add(id);
      }
      renderTree();
    }

    function collapseAll() {
      openSet.clear();
      openSet.add("root");
      renderTree();
    }

    function filterTree(q) {
      const query = q.trim().toLowerCase();
      document.querySelectorAll(".tree-node").forEach(node => {
        const id = node.dataset.id;
        const n = NODES[id];
        const text = [n.name, n.tag, n.summary, n.note, n.couldAdd].filter(Boolean).join(" ").toLowerCase();
        const fileText = (n.files || []).map(f => f.join(" ")).join(" ").toLowerCase();
        const match = !query || text.includes(query) || fileText.includes(query);
        node.classList.toggle("hidden", !match);
        if (match && query) {
          node.querySelector(".tree-row")?.classList.add("match");
          if (n.children) openSet.add(id);
        }
      });
      if (query) {
        let parent = document.getElementById("tree");
        parent.querySelectorAll(".children").forEach(c => c.classList.add("open"));
      }
    }

    document.getElementById("expandAll").onclick = expandAll;
    document.getElementById("collapseAll").onclick = collapseAll;
    document.getElementById("search").oninput = (e) => {
      if (!e.target.value) {
        document.querySelectorAll(".tree-node.hidden").forEach(n => n.classList.remove("hidden"));
        document.querySelectorAll(".tree-row.match").forEach(r => r.classList.remove("match"));
        collapseAll();
        return;
      }
      collapseAll();
      expandAll();
      filterTree(e.target.value);
    };

    renderTree();
    renderDetail("root");
    selectedId = "root";
    renderTree();
  </script>
</body>
</html>
